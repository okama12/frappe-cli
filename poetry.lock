[[package]]
name = "black"
version = "23.11.0"
description = "The uncompromising code formatter."
category = "dev"
optional = false
python-versions = ">=3.8"

[package.dependencies]
clickhouse-driver = {version = ">=0.2.0", optional = true, markers = "extra == \"clickhouse\""}
cliff = {version = ">=3.0.0", optional = true, markers = "extra == \"d\""}
colorama = {version = ">=0.4.3", markers = "platform_system == \"Windows\""}
mypy-extensions = ">=0.4.3"
pathspec = ">=0.9.0"
platformdirs = ">=2"
tomli = {version = ">=1.1.0", markers = "python_version < \"3.11\""}
typing-extensions = ">=4.0.0"

[package.extras]
colorama = ["colorama (>=0.4.3)"]
d = ["aiohttp (>=3.7.4)", "cliff (>=3.0.0)", "uvloop (>=0.15.2)", "rich (>=10.11.0)", "tomli (>=1.1.0)", "typing-extensions (>=4.0.0)", "pathspec (>=0.9.0)", "platformdirs (>=2)", "mypy-extensions (>=0.4.3)", "tokenize-rt (>=4.2.1)", "aiohttp-cors (>=0.7.0)", "aiohttp-cors", "aiohttp", "click (>=8.0.0)", "packaging (>=22.0)", "uvloop"]
clickhouse = ["clickhouse-driver (>=0.2.0)"]
juniper = ["tokenize-rt (>=4.2.1)"]
uvloop = ["uvloop (>=0.15.2)"]

